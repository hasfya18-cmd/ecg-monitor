<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ECG Remote Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
        }

        .login-card {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(56, 189, 248, 0.12);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-dot {
            width: 14px;
            height: 14px;
            background: #22d3ee;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
        }

        .login-logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .login-logo .accent { color: #22d3ee; }

        .login-subtitle {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(51, 65, 85, 0.8);
            color: #f8fafc;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #3b82f6;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.82rem;
            margin-top: 12px;
            min-height: 20px;
        }

        .disclaimer {
            margin-top: 24px;
            font-size: 0.72rem;
            color: #475569;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-dot"></div>
            <h1>ECG <span class="accent">Monitor</span></h1>
        </div>
        <p class="login-subtitle">IoT Remote Monitoring — Sistem Simulasi</p>

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-login">Masuk ke Dashboard</button>
            {% if error %}
            <p class="error-msg">{{ error }}</p>
            {% endif %}
        </form>

        <p class="disclaimer">
            ⚠️ Sistem ini merupakan simulasi untuk keperluan penelitian dan bukan alat diagnosa medis resmi.
        </p>
    </div>
</body>

</html>
